<!DOCTYPE html>
<html>


<canvas
    id="canvas"
    width="520"
    height="520"
    style="border:1px solid black;">
</canvas>

<br>

<button id="predict">
Predict
</button>

<button id="clear">
Clear
</button>

<p id="result"></p>

</html>

<script>
    const clearButton = document.getElementById("clear");
    const predictButton = document.getElementById("predict");
    const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

ctx.fillStyle = "black";
ctx.fillRect(0,0,canvas.width,canvas.height);

const pixelData = Array(784).fill(0);

const intervalId = setInterval(() => {
  fetch('/api/data', {
    method: 'POST',
    headers: {
    'Content-Type': 'application/json'
    },
    body: JSON.stringify(pixelData)
    })
}, 2000);

function fillPixel(x, y){
    let num = canvas.width/28;
    let floorX = Math.floor(x/num) * num;
    let floorY = Math.floor(y/num) * num;
    ctx.fillStyle = "white";
    ctx.fillRect(floorX, floorY, num, num);
    console.log(Math.floor(y/num) + ", " + Math.floor(x/num));
    pixelData[Math.floor(y/num) * 28 + Math.floor(x/num)] = 1;
}

clearButton.addEventListener("click", () => {
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    pixelData.fill(0);
    console.log("button clicked");
});

predictButton.addEventListener("click", () => {
/*
    fetch('/api/data', {
    method: 'POST',
    headers: {
    'Content-Type': 'application/json'
    },
    body: JSON.stringify(pixelData)
    }) */

    console.log("button clicked");
});

let drawing = false;

canvas.onmousedown = () => drawing = true;
canvas.onmouseup = () => drawing = false;

canvas.onmousemove = e => {

    if(!drawing) return;

    const rect = canvas.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    fillPixel(x, y);
};
</script>
