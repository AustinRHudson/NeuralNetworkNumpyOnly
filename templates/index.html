<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNIST Digit Recognizer</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: fit-content;
        }

        h1 {
            margin-bottom: 1rem;
            color: #333;
        }

        canvas {
            border: 2px solid #ddd;
            border-radius: 12px;
            background: white;
            cursor: crosshair;
        }

        .prediction-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 12px;
        }

        .prediction-label {
            color: #666;
            font-size: 1rem;
        }

        #prediction {
            display: block;
            font-size: 3rem;
            font-weight: bold;
            color: #2563eb;
            margin-top: 0.5rem;
        }

        button {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        #result {
            margin-top: 1rem;
            color: #555;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Digit Recognizer</h1>

        <canvas
            id="canvas"
            width="520"
            height="520">
        </canvas>

        <div class="prediction-box">
            <div class="prediction-label">Current Prediction</div>
            <span id="prediction">5</span>
        </div>

        <button id="clear">Clear Canvas</button>

        <p id="result"></p>
    </div>
</body>
</html>

<script>
    const clearButton = document.getElementById("clear");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const predictText = document.getElementById("prediction");

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const pixelData = Array(784).fill(0);

const intervalId = setInterval(() => {
  fetch('/api/data', {
    method: 'POST',
    headers: {
    'Content-Type': 'application/json'
    },
    body: JSON.stringify(pixelData)
    }).then(response => response.json()).then(data => {
    //console.log(data.prediction);
    predictText.textContent = data.prediction;
});
}, 100);

function checkUp(calc){
    if(calc - 28 > 0){
        return pixelData[calc - 28];
    }
    return 0;
}

function checkDown(calc){
    if(calc + 28 > 0){
       return pixelData[calc + 28];
    }
    return 0;
}

function alphaCalc(calc){
    let num = 0;
    let currentCalc = calc
    if(pixelData[calc] >= 1){
        return 1;
    }
    num += checkUp(currentCalc);
    num += checkDown(currentCalc);
    currentCalc = calc + 1
    if((currentCalc)%27 != 0){
        num += pixelData[currentCalc];
        num += checkUp(currentCalc);
        num += checkDown(currentCalc);
    }
    currentCalc = calc - 1;
    if((currentCalc)%28 != 0){
        num += pixelData[currentCalc];
        num += checkUp(currentCalc);
        num += checkDown(currentCalc);
    }
    return num/8;
}

function checkAlphaUp(calc){
    if(calc - 28 > 0){
        let alpha = alphaCalc(calc - 28);
        return alpha;
    }
    return 0;
}

function checkAlphaDown(calc){
    if(calc + 28 < 784){
        let alpha = alphaCalc(calc + 28);
        return alpha;
    }
    return 0;
}

function checkNeighbors(calc, x, y, num){
    let currentAlpha = 0;
    let currentCalc = calc;
    let alphaArray = Array(8).fill(0)
    let index = 0;
    currentAlpha = checkAlphaUp(currentCalc);
    alphaArray[index] = currentAlpha;
    index += 1;
    currentAlpha = checkAlphaDown(currentCalc);
    alphaArray[index] = currentAlpha;
    index += 1;
    if((currentCalc)%27 != 0){
        currentCalc = calc + 1;
        currentAlpha = alphaCalc(currentCalc);
        alphaArray[index] = currentAlpha;
        index += 1;
        currentAlpha = checkAlphaUp(currentCalc);
        alphaArray[index] = currentAlpha;
        index += 1;
        currentAlpha = checkAlphaDown(currentCalc);
        alphaArray[index] = currentAlpha;
        index += 1;
    }else{
        for(let i = 0; i < 3; i++){
            alphaArray[index] = 0;
            index += 1;
        }
    }
    currentCalc = calc;
    if((currentCalc)%28 != 0){
        currentCalc = calc - 1;
        currentAlpha = alphaCalc(currentCalc);
        alphaArray[index] = currentAlpha;
        index += 1;
        currentAlpha = checkAlphaUp(currentCalc);
        alphaArray[index] = currentAlpha;
        index += 1;
        currentAlpha = checkAlphaDown(currentCalc);
        alphaArray[index] = currentAlpha;
        index += 1;
    }else{
        for(let i = 0; i < 3; i++){
            alphaArray[index] = 0;
            index += 1;
        }
    }
    currentCalc = calc;
    index = 0;
    currentAlpha = alphaArray[index];
    ctx.fillStyle = `rgba(255, 255, 255, ${currentAlpha})`;
    ctx.fillRect(x , y - num, num, num);
    if(currentCalc - 28 > 0){
        pixelData[currentCalc - 28] = currentAlpha
    }
    index += 1;
    currentAlpha = alphaArray[index];
    ctx.fillStyle = `rgba(255, 255, 255, ${currentAlpha})`;
    ctx.fillRect(x , y + num, num, num);
    if(currentCalc + 28 < 784){
        pixelData[currentCalc + 28] = currentAlpha
    }
    currentCalc = calc + 1;
    if((currentCalc)%27 != 0){
        index += 1;
        currentAlpha = alphaArray[index];
        ctx.fillStyle = `rgba(255, 255, 255, ${currentAlpha})`;
        ctx.fillRect(x + num, y, num, num);
        if(currentCalc < 784){
            pixelData[currentCalc] = currentAlpha
        }
        if(currentCalc - 28 > 0){
            index += 1;
            currentAlpha = alphaArray[index];
            ctx.fillStyle = `rgba(255, 255, 255, ${currentAlpha})`;
            ctx.fillRect(x + num, y - num, num, num);
            if(currentCalc - 28 > 0){
                pixelData[currentCalc - 28] = currentAlpha
            }
        }else{
            index += 1;
        }
        if(currentCalc + 28 > 0){
            index += 1;
            currentAlpha = alphaArray[index];
            ctx.fillStyle = `rgba(255, 255, 255, ${currentAlpha})`;
            ctx.fillRect(x + num, y + num, num, num);
            if(currentCalc + 28 < 784){
                pixelData[currentCalc + 28] = currentAlpha
            }
        }else{
            index += 1;
        }
    }else{
        for(let i = 0; i < 3; i++){
            index += 1;
        }
    }
    currentCalc = calc - 1;
    if((currentCalc)%28 != 0){
        index += 1;
        currentAlpha = alphaArray[index];
        ctx.fillStyle = `rgba(255, 255, 255, ${currentAlpha})`;
        ctx.fillRect(x - num, y, num, num);
        if(currentCalc > 0){
            pixelData[currentCalc] = currentAlpha;
        }
        if(currentCalc - 28 > 0){
            index += 1;
            currentAlpha = alphaArray[index];
            ctx.fillStyle = `rgba(255, 255, 255, ${currentAlpha})`;
            ctx.fillRect(x - num, y - num, num, num);
            if(currentCalc - 28 > 0){
                pixelData[currentCalc - 28] = currentAlpha
            }
        }else{
            index += 1;
        }
        if(currentCalc + 28 > 0){
            index += 1;
            currentAlpha = alphaArray[index];
            ctx.fillStyle = `rgba(255, 255, 255, ${currentAlpha})`;
            ctx.fillRect(x - num, y + num, num, num);
            if(currentCalc + 28 < 784){
                pixelData[currentCalc + 28] = currentAlpha
            }
        }else{
            index += 1;
        }
    }else{
        for(let i = 0; i < 3; i++){
            index += 1;
        }
    }

    console.log(alphaArray);
}

function fillPixel(x, y){
    let num = canvas.width/28;
    let floorX = Math.floor(x/num) * num;
    let floorY = Math.floor(y/num) * num;
    ctx.fillStyle = "white";
    ctx.fillRect(floorX, floorY, num, num);
    let calc = Math.floor(y/num) * 28 + Math.floor(x/num);
    if(calc < 784){
        pixelData[calc] = 1;
    }
    checkNeighbors(calc, floorX, floorY, num);
}

clearButton.addEventListener("click", () => {
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    pixelData.fill(0);
    console.log("button clicked");
});

let drawing = false;

canvas.onmousedown = () => drawing = true;
canvas.onmouseup = () => drawing = false;

canvas.onmousemove = e => {

    if(!drawing) return;

    const rect = canvas.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    fillPixel(x, y);
};
</script>
