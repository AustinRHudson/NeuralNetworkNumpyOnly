<!DOCTYPE html>
<html>


<canvas
    id="canvas"
    width="520"
    height="520"
    style="border:1px solid black;">
</canvas>

<br>

<button id="predict">
Predict
</button>

<button id="clear">
Clear
</button>

<p id="result"></p>

</html>

<script>
    const clearButton = document.getElementById("clear");
    const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

ctx.fillStyle = "black";
ctx.fillRect(0,0,canvas.width,canvas.height);

const pixelData = Array(784).fill(0);

function fillPixel(x, y){
    let num = canvas.width/28;
    let floorX = Math.floor(x/num) * num;
    let floorY = Math.floor(y/num) * num;
    ctx.fillStyle = "white";
    ctx.fillRect(floorX, floorY, num, num);
    pixelData[floorY * num + floorX] = 1;
}

clearButton.addEventListener("click", () => {
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    pixelData = Array(784).fill(0);
    console.log("button clicked");
});

let drawing = false;

canvas.onmousedown = () => drawing = true;
canvas.onmouseup = () => drawing = false;

canvas.onmousemove = e => {

    if(!drawing) return;

    const rect = canvas.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    fillPixel(x, y);
};
</script>
